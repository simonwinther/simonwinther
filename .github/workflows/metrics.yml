name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: # Allows manual run
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Render isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/isocalendar.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Render coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/habits.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Habits & Activity
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes

      - name: Render language activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/languages.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Language activity
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 30

      - name: Render lines of code
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/lines.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Lines of code changed
          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 4

      - name: Render commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/calendar.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Commit calendar
          plugin_calendar: yes
          plugin_calendar_limit: 0

      - name: Render achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/achievements.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact

      - name: Commit generated metrics
        run: |
          sudo cp -R /metrics_renders/. .
          test -d metrics
          sudo chown -R "$USER":"$USER" metrics
          git add metrics

          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(metrics): update metrics [skip ci]"
          git push
