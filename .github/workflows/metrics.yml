name: Metrics
on:
  schedule: [{cron: "0 0 */10 * *"}]
  workflow_dispatch: # Allows manual run
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove unused metrics
        run: |
          rm -f metrics/habits.svg
          rm -f metrics/languages.svg
          rm -f metrics/lines.svg
          rm -f metrics/calendar.svg
          rm -f metrics/achievements.svg

      - name: Render profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          filename: metrics/base.svg
          output_action: none
          config_timezone: Europe/Copenhagen

      - name: Store profile metrics
        run: |
          sudo mkdir -p metrics
          sudo cp /metrics_renders/metrics/base.svg metrics/base.svg
          sudo chown -R "$USER":"$USER" metrics

      - name: Render isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          user: simonwinther
          template: classic
          base: ""
          filename: metrics/isocalendar.svg
          output_action: none
          config_timezone: Europe/Copenhagen

          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Store isometric commit calendar
        run: |
          sudo mkdir -p metrics
          sudo cp /metrics_renders/metrics/isocalendar.svg metrics/isocalendar.svg
          sudo chown -R "$USER":"$USER" metrics

      - name: Commit generated metrics
        run: |
          git add -A metrics

          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(metrics): update metrics [skip ci]"
          git push
