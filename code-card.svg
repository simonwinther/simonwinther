<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated neural network code banner">
  <defs>
    <style>
      .code {
        font-family: JetBrains Mono, Fira Code, Consolas, Menlo, monospace;
        font-size: 15.5px;
        font-weight: 500;
        letter-spacing: 0.12px;
        white-space: pre;
      }

      .fg { fill: #c0caf5; }
      .kw { fill: #f7768e; }
      .type { fill: #2ac3de; }
      .method { fill: #7dcfff; }
      .string { fill: #e0af68; }
      .num { fill: #bb9af7; }
      .green { fill: #9ece6a; }
      .orange { fill: #ff9e64; }
      .cyan { fill: #73daca; }
      .dim { fill: #565f89; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="50%" stop-color="#0f141b"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>

    <linearGradient id="panelFill" x1="150" y1="34" x2="1050" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.82"/>
      <stop offset="50%" stop-color="#10151d" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.80"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="150" y1="34" x2="1050" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.52"/>
      <stop offset="50%" stop-color="#7aa2f7" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0.48"/>
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
