  <!-- code panel -->
  <rect x="60" y="34" width="780" height="204" rx="16" fill="url(#panelFill)" opacity="0.84" filter="url(#panelShadow)"/>
  <rect x="60.5" y="34.5" width="779" height="203" rx="15.5" stroke="url(#panelStroke)"/>
  <rect x="77" y="51" width="746" height="170" rx="11" fill="#0d1117" opacity="0.18"/>

  <!-- indent guides -->
  <g stroke="#2f3b52" stroke-width="1" stroke-dasharray="3 6" opacity="0.30">
    <line x1="134" y1="89" x2="134" y2="211"/>
    <line x1="170" y1="129" x2="170" y2="211"/>
    <line x1="206" y1="148" x2="206" y2="211"/>
  </g>

  <!-- code -->
  <g class="code" xml:space="preserve">
    <text x="100" y="68">
      <tspan class="type">Developer</tspan><tspan class="fg"> dev = </tspan><tspan class="kw">new</tspan><tspan class="fg"> </tspan><tspan class="type">Developer</tspan><tspan class="fg">(</tspan><tspan class="kw">new</tspan><tspan class="fg"> </tspan><tspan class="type">User</tspan><tspan class="fg">(</tspan><tspan class="num">3</tspan><tspan class="fg">, </tspan><tspan class="string">&quot;Simon Winther&quot;</tspan><tspan class="fg">));</tspan>
    </text>

    <text x="100" y="88">
      <tspan class="kw">if</tspan><tspan class="fg"> (!(dev.</tspan><tspan class="method">getProjects</tspan><tspan class="fg">().</tspan><tspan class="method">allMatch</tspan><tspan class="fg">(</tspan><tspan class="cyan">Project</tspan><tspan class="fg">::</tspan><tspan class="method">isDone</tspan><tspan class="fg">))) {</tspan>
    </text>

    <text x="134" y="108">
      <tspan class="fg">dev.</tspan><tspan class="method">getProjects</tspan><tspan class="fg">()</tspan>
    </text>

    <text x="170" y="128">
      <tspan class="fg">.</tspan><tspan class="method">filter</tspan><tspan class="fg">(</tspan><tspan class="green">Predicate</tspan><tspan class="fg">.</tspan><tspan class="method">not</tspan><tspan class="fg">(</tspan><tspan class="cyan">Project</tspan><tspan class="fg">::</tspan><tspan class="method">isDone</tspan><tspan class="fg">))</tspan>
    </text>

    <text x="170" y="148">
      <tspan class="fg">.</tspan><tspan class="method">forEach</tspan><tspan class="fg">(</tspan><tspan class="orange">project</tspan><tspan class="fg"> -&gt; {</tspan>
    </text>

    <text x="206" y="168">
      <tspan class="kw">try</tspan><tspan class="fg"> { </tspan><tspan class="orange">project</tspan><tspan class="fg">.</tspan><tspan class="method">finish</tspan><tspan class="fg">(); }</tspan>
    </text>

    <text x="206" y="188">
      <tspan class="kw">catch</tspan><tspan class="fg"> (</tspan><tspan class="cyan">ProjectCompletionException</tspan><tspan class="fg"> e) { </tspan><tspan class="green">dev</tspan><tspan class="fg">.</tspan><tspan class="method">cryHimselfToSleep</tspan><tspan class="fg">(); }</tspan>
    </text>

    <text x="170" y="208">
      <tspan class="fg">});</tspan>
    </text>

    <text x="100" y="228">
      <tspan class="fg">}</tspan>
    </text>
  </g>

  <rect x="0.5" y="0.5" width="899" height="259" rx="17.5" stroke="#222a35"/>
</svg>
