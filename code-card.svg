  <rect x="80.5" y="34.5" width="779" height="193" rx="15.5" stroke="url(#panelStroke)"/>
  <rect x="97" y="51" width="746" height="160" rx="11" fill="#0d1117" opacity="0.18"/>

  <!-- indent guides -->
