<svg width="920" height="260" viewBox="0 0 920 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated neural network code banner">
  <defs>
    <style>
      .code {
        font-family: JetBrains Mono, Fira Code, Consolas, Menlo, monospace;
        font-size: 15.5px;
        font-weight: 450;
        letter-spacing: 0.12px;
        white-space: pre;
      }

      .fg { fill: #c0caf5; }
      .kw { fill: #f7768e; }
      .type { fill: #2ac3de; }
      .method { fill: #7dcfff; }
      .string { fill: #e0af68; }
      .num { fill: #bb9af7; }
      .green { fill: #9ece6a; }
      .orange { fill: #ff9e64; }
      .cyan { fill: #73daca; }
      .dim { fill: #515f89; }
