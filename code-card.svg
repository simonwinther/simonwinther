        <animate attributeName="cy" values="79;59;79" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.7" fill="#9ece6a">
        <animate attributeName="cx" values="824;848;824" dur="8.5s" repeatCount="indefinite"/>
