  <!-- center drifting particles -->
  <g filter="url(#softGlow)" opacity="0.95">
    <circle cx="520" cy="70" r="2.2" fill="#7aa2f7">
      <animate attributeName="cx" values="520;585;545;520" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;40;98;70" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="610" cy="120" r="2.0" fill="#bb9af7">
      <animate attributeName="cx" values="610;670;628;610" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;86;156;120" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="188" r="2.2" fill="#9ece6a">
      <animate attributeName="cx" values="560;618;574;560" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="188;154;214;188" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="665" cy="84" r="1.9" fill="#7dcfff">
