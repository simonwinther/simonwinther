        <animate attributeName="cy" values="79;59;79" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.7" fill="#9ece6a">
        <animate attributeName="cx" values="554;578;554" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="41;56;41" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.9" fill="#bb9af7">
        <animate attributeName="cx" values="636;618;636" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="84;108;84" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.7" fill="#7dcfff">
        <animate attributeName="cx" values="722;746;722" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="50;30;50" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.8" fill="#9ece6a">
        <animate attributeName="cx" values="812;790;812" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="90;112;90" dur="8.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.6" fill="#bb9af7">
        <animate attributeName="cx" values="858;858;858" dur="8.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="58;84;58" dur="8.5s" repeatCount="indefinite"/>
