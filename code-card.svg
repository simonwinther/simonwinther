    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="50%" stop-color="#0f141b"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>

    <linearGradient id="panelFill" x1="80" y1="34" x2="860" y2="228" gradientUnits="userSpaceOnUse">
