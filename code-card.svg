  <!-- center drifting particles -->
  <g filter="url(#softGlow)" opacity="0.95">
    <circle cx="370" cy="70" r="2.2" fill="#7aa2f7">
      <animate attributeName="cx" values="370;435;395;370" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;40;98;70" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="410" cy="120" r="2.0" fill="#bb9af7">
      <animate attributeName="cx" values="410;520;478;410" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;86;156;120" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="410" cy="188" r="2.2" fill="#9ece6a">
      <animate attributeName="cx" values="410;468;424;410" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="188;154;214;188" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="84" r="1.9" fill="#7dcfff">
      <animate attributeName="cx" values="500;570;530;500" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="84;52;118;84" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="440" cy="176" r="2.1" fill="#7aa2f7">
