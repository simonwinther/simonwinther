        <animate attributeName="cy" values="191;170;191" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.7" fill="#7dcfff">
        <animate attributeName="cx" values="522;468;522" dur="9.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="147;163;147" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.8" fill="#bb9af7">
        <animate attributeName="cx" values="610;632;610" dur="9.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="186;165;186" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.7" fill="#9ece6a">
        <animate attributeName="cx" values="699;676;699" dur="9.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="144;161;144" dur="9.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.8" fill="#7aa2f7">
